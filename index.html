<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JET X</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0f;
  color:#fff;
  font-family:monospace;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 10px;
}
h1 {
  font-size:1.8rem;
  letter-spacing:0.3em;
  color:#00e5ff;
  text-shadow:0 0 20px #00e5ff88;
  margin-bottom:1rem;
}
#box {
  width:95vw;
  max-width:500px;
  background:#0d0d1a;
  border:1px solid #1a1a3a;
  border-radius:16px;
  overflow:hidden;
}
#topbar {
  padding:0.4rem 1rem;
  background:#0a0a18;
  border-bottom:1px solid #1a1a3a;
  display:flex;
  justify-content:space-between;
  font-size:0.75rem;
  color:#555;
}
#stat { color:#00e5ff; }
#screen {
  height:200px;
  background:#05050f;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
#mult {
  font-size:3.5rem;
  font-weight:900;
  color:#fff;
  text-shadow:0 0 30px #00e5ffaa;
  z-index:2;
  transition:color 0.3s;
}
#mult.red { color:#ff4444; text-shadow:0 0 30px #ff444488; }
#rocket {
  position:absolute;
  font-size:2rem;
  bottom:20px;
  left:20px;
  transition:bottom 0.1s, left 0.1s;
  z-index:3;
}
#crashed-msg {
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  font-size:2rem;
  font-weight:900;
  flex-direction:column;
  gap:0.5rem;
}
#crashed-msg.show { display:flex; }
#crashed-msg .ct { color:#ff4444; }
#crashed-msg .cw { color:#00ff88; }
#crashed-msg small { font-size:0.9rem; color:#aaa; }
#hist {
  display:flex;
  gap:0.4rem;
  padding:0.5rem 1rem;
  overflow-x:auto;
  border-top:1px solid #1a1a3a;
  scrollbar-width:none;
}
#hist::-webkit-scrollbar { display:none; }
.pill {
  font-size:0.7rem;
  padding:0.2rem 0.5rem;
  border-radius:20px;
  white-space:nowrap;
  flex-shrink:0;
}
.low  { background:#1a0a0a; color:#ff6666; border:1px solid #ff333322; }
.mid  { background:#0a1a0a; color:#66ff88; border:1px solid #00ff3322; }
.high { background:#0a0a2a; color:#66aaff; border:1px solid #0066ff22; }
.mega { background:#1a0a2a; color:#dd88ff; border:1px solid #aa00ff22; }
#ctrl {
  padding:1rem;
  display:flex;
  flex-direction:column;
  gap:0.8rem;
}
.row { display:flex; align-items:center; gap:0.5rem; }
.row label { font-size:0.75rem; color:#888; width:90px; flex-shrink:0; }
input[type=number] {
  flex:1;
  background:#111125;
  border:1px solid #2a2a4a;
  color:#fff;
  font-family:monospace;
  font-size:1rem;
  padding:0.5rem 0.7rem;
  border-radius:8px;
  outline:none;
}
input:focus { border-color:#00e5ff; }
.pres { display:flex; gap:0.3rem; }
.p {
  background:#111125;
  border:1px solid #2a2a4a;
  color:#888;
  font-family:monospace;
  font-size:0.7rem;
  padding:0.35rem 0.5rem;
  border-radius:6px;
  cursor:pointer;
}
.p:active { border-color:#00e5ff; color:#00e5ff; }
.arow { display:flex; gap:0.7rem; }
#bbtn {
  flex:1; padding:0.85rem;
  font-size:1rem; font-weight:700;
  border:none; border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#00e5ff,#007aff);
  color:#000; letter-spacing:0.08em;
}
#bbtn:disabled { background:#1a1a3a; color:#444; cursor:not-allowed; }
#cbtn {
  flex:1; padding:0.85rem;
  font-size:1rem; font-weight:700;
  border:none; border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#00ff88,#00cc66);
  color:#000; letter-spacing:0.08em;
  display:none;
}
#cbtn.show { display:block; }
#balrow {
  display:flex; justify-content:space-between;
  padding-top:0.5rem;
  border-top:1px solid #1a1a3a;
  font-size:0.8rem; color:#555;
}
#bal { color:#ffd700; }
</style>
</head>
<body>

<h1>✈ JET X</h1>

<div id="box">
  <div id="topbar">
    <span>PROVABLY FAIR</span>
    <span id="stat">ᲘᲢᲕᲘᲠᲗᲔᲑᲐ...</span>
    <span id="rnum">ROUND #1</span>
  </div>

  <div id="screen">
    <div id="rocket">✈</div>
    <div id="mult">1.00x</div>
    <div id="crashed-msg">
      <span class="ct" id="cmsg">CRASHED!</span>
      <small id="csub"></small>
    </div>
  </div>

  <div id="hist"></div>

  <div id="ctrl">
    <div class="row">
      <label>ᲤᲡᲝᲜᲘ</label>
      <input type="number" id="bi" value="10" min="1">
      <div class="pres">
        <button class="p" onclick="sb(10)">10</button>
        <button class="p" onclick="sb(50)">50</button>
        <button class="p" onclick="sb(100)">100</button>
        <button class="p" onclick="hb()">½</button>
        <button class="p" onclick="db()">2x</button>
      </div>
    </div>
    <div class="row">
      <label>AUTO OUT</label>
      <input type="number" id="ai" placeholder="მაგ: 2.00" min="1.01" step="0.01">
    </div>
    <div class="arow">
      <button id="bbtn" onclick="placeBet()">ᲤᲡᲝᲜᲘᲡ ᲓᲐᲓᲔᲑᲐ</button>
      <button id="cbtn" onclick="cashOut()">CASH OUT</button>
    </div>
    <div id="balrow">
      <span>ᲑᲐᲚᲐᲜᲡᲘ</span>
      <span id="bal">💰 1,000</span>
    </div>
  </div>
</div>

<script>
let bal=1000, mult=1, crashAt, state='wait';
let betOn=false, betAmt=0, intv, round=1;
let rx=20, ry=20;

const multEl=document.getElementById('mult');
const cbtn=document.getElementById('cbtn');
const bbtn=document.getElementById('bbtn');
const cmsg=document.getElementById('crashed-msg');
const cmsgt=document.getElementById('cmsg');
const csub=document.getElementById('csub');
const balEl=document.getElementById('bal');
const statEl=document.getElementById('stat');
const histEl=document.getElementById('hist');
const rnumEl=document.getElementById('rnum');
const rocket=document.getElementById('rocket');
const screen=document.getElementById('screen');

function upBal(){ balEl.textContent='💰 '+Math.floor(bal).toLocaleString(); }
function sb(v){ document.getElementById('bi').value=v; }
function hb(){ const v=parseFloat(document.getElementById('bi').value)||10; document.getElementById('bi').value=Math.max(1,Math.floor(v/2)); }
function db(){ const v=parseFloat(document.getElementById('bi').value)||10; document.getElementById('bi').value=Math.min(bal,v*2); }
function fmt(m){ return m.toFixed(2)+'x'; }

function genCrash(){
  if(Math.random()<0.05) return 1.00;
  return Math.max(1.01, 1/(1-Math.random()*0.95));
}

function placeBet(){
  if(state!=='wait'){ alert('დაელოდე შემდეგ round-ს!'); return; }
  const b=parseFloat(document.getElementById('bi').value);
  if(!b||b<1||b>bal){ alert('არასწორი ფსონი!'); return; }
  betAmt=b; betOn=true; bal-=b; upBal();
  bbtn.disabled=true;
  statEl.textContent='ᲤᲡᲝᲜᲘ ᲓᲐᲓᲔᲑᲣᲚᲘᲐ ✓';
}

function cashOut(){
  if(state!=='run'||!betOn) return;
  const win=betAmt*mult;
  bal+=win; upBal();
  betOn=false;
  cbtn.classList.remove('show');
  bbtn.disabled=false;
  cmsgt.className='cw';
  cmsgt.textContent='+'+Math.floor(win)+' ('+fmt(mult)+')';
  csub.textContent='გაიმარჯვე!';
  cmsg.classList.add('show');
  setTimeout(()=>cmsg.classList.remove('show'),1500);
  statEl.textContent='CASH OUT @ '+fmt(mult);
}

function startRound(){
  crashAt=genCrash();
  mult=1.00; state='run';
  rx=20; ry=20;
  multEl.className='';
  multEl.textContent='1.00x';
  cmsg.classList.remove('show');
  rocket.style.bottom='20px';
  rocket.style.left='20px';
  rocket.style.transform='rotate(-30deg)';
  rnumEl.textContent='ROUND #'+round;
  statEl.textContent='ᲤᲠᲘᲜᲐᲕᲡ...';
  if(betOn){ cbtn.classList.add('show'); cbtn.textContent='CASH OUT '+fmt(mult); }

  let t=0;
  intv=setInterval(()=>{
    t+=0.1;
    mult=Math.round(Math.pow(Math.E,t*0.07*(1+t*0.01))*100)/100;

    // move rocket
    const sh=screen.offsetHeight, sw=screen.offsetWidth;
    const prog=Math.min(mult/Math.max(crashAt,2),0.9);
    rx=20+prog*(sw*0.75);
    ry=20+prog*(sh*0.65);
    rocket.style.left=rx+'px';
    rocket.style.bottom=ry+'px';

    multEl.textContent=fmt(mult);
    if(mult>crashAt*0.8) multEl.classList.add('red');

    if(betOn){
      cbtn.textContent='CASH OUT '+fmt(mult);
      const av=parseFloat(document.getElementById('ai').value);
      if(av&&mult>=av) cashOut();
    }

    if(mult>=crashAt){ endRound(); }
  },100);
}

function endRound(){
  clearInterval(intv);
  state='crash';
  multEl.textContent=fmt(crashAt);
  multEl.classList.add('red');
  statEl.textContent='CRASHED @ '+fmt(crashAt);
  rocket.style.transform='rotate(90deg)';
  addHist(crashAt);

  if(betOn){
    betOn=false; cbtn.classList.remove('show');
    cmsgt.className='ct'; cmsgt.textContent='CRASHED! -'+betAmt;
    csub.textContent=fmt(crashAt)+' — წააგე';
    cmsg.classList.add('show');
  }
  bbtn.disabled=false; round++;

  setTimeout(()=>{
    cmsg.classList.remove('show');
    state='wait';
    statEl.textContent='⏳ '+round+' ROUND 3 წამში...';
    setTimeout(startRound,3000);
  },2500);
}

function addHist(m){
  const p=document.createElement('div');
  p.className='pill '+(m<1.5?'low':m<3?'mid':m<10?'high':'mega');
  p.textContent=fmt(m);
  histEl.insertBefore(p,histEl.firstChild);
  if(histEl.children.length>20) histEl.removeChild(histEl.lastChild);
}

upBal();
statEl.textContent='⏳ ROUND 1 3 წამში...';
setTimeout(startRound,3000);
</script>
</body>
</html>
